version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: automl
      POSTGRES_PASSWORD: automl
      POSTGRES_DB: automl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automl"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /mlflow
    command: >
      bash -c "pip install --no-cache-dir mlflow==2.16.0 psycopg2-binary==2.9.9 &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri postgresql://automl:automl@postgres:5432/automl
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://automl:automl@postgres:5432/automl
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  mlflow_artifacts:
  backend_storage:
